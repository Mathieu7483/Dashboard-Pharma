<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification Dashboard Pharma</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
    
    <div id="status-message" class="message" style="display: none;"></div>

    <form id="login-form">
        <h2>Connexion</h2>
        
        <input type="text" id="login-username" placeholder="Nom d'utilisateur" required>
        
        <div class="input-group">
            <input type="password" id="login-password" placeholder="Mot de passe" required>
            <span class="password-toggle" data-target="login-password">Afficher</span>
        </div>
        
        <button type="submit">Se connecter</button>
        
        <p class="toggle-link">Pas encore de compte ? <a href="#">S'enregistrer</a></p>
    </form>

    <form id="register-form" style="display: none;">
        <h2>Enregistrement</h2>
        
        <input type="text" id="register-username" placeholder="Nom d'utilisateur" required>
        
        <input type="email" id="register-email" placeholder="Adresse e-mail" required> 
        
        <div class="input-group">
            <input type="password" id="register-password" placeholder="Mot de passe" required>
            <span class="password-toggle" data-target="register-password">Afficher</span>
        </div>
        
        <div class="input-group">
            <input type="password" id="register-password-confirm" placeholder="Confirmer le mot de passe" required>
            <span class="password-toggle" data-target="register-password-confirm">Afficher</span>
        </div>
        
        <button type="submit">S'enregistrer</button>
        
        <p class="toggle-link">J'ai déjà un compte ? <a href="#">Se connecter</a></p>
    </form>

</div>

<script src="javascript/auth.js"></script>
</body>
</html>
