<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Dashboard - Authentication</title>
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
    
    <div id="status-message" class="message" style="display: none;"></div>

    <form id="login-form">
        <h2>Login</h2>
        
        <div class="input-group">
            <input type="text" id="login-username" placeholder="Username" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="login-password" placeholder="Password" required>
            <span class="password-toggle" data-target="login-password">Show</span>
        </div>
        
        <button type="submit">Sign In</button>
        
        <p class="toggle-link">Don't have an account yet? <a href="#">Register here</a></p>
    </form>

    <form id="register-form" style="display: none;">
        <h2>Create Account</h2>
        
        <div class="input-group">
            <input type="text" id="register-username" placeholder="Username" required>
        </div>
        
        <div class="input-group">
            <input type="email" id="register-email" placeholder="Email Address" required> 
        </div>
        
        <div class="input-group">
            <input type="password" id="register-password" placeholder="Password" required>
            <span class="password-toggle" data-target="register-password">Show</span>
        </div>
        
        <div class="input-group">
            <input type="password" id="register-password-confirm" placeholder="Confirm Password" required>
            <span class="password-toggle" data-target="register-password-confirm">Show</span>
        </div>
        
        <button type="submit">Sign Up</button>
        
        <p class="toggle-link">Already registered? <a href="#">Login here</a></p>
    </form>

</div>

<script src="javascript/auth.js"></script>
</body>
</html>
