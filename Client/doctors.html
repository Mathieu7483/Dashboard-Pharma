<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma Dashboard | Doctor Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-wrapper">
        <div id="navbar-placeholder"></div>

        <main class="content-area">
            <header class="top-bar">
                <div class="page-info">
                    <h2>Doctor Management System</h2>
                </div>
                <div class="top-bar-right">
                    <div class="avatar"></div>
                    <button class="btn-logout-top">Logout</button>
                </div>
            </header>

            <section class="content-section inventory-page-content">
                <div class="inventory-container">
                    <header class="page-header">
                        <h1>🩺 Doctor Management</h1>
                        <button id="add-doctor-btn" class="btn-logout-top">➕ Add New doctor</button>
                    </header>

                    <div class="stats-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 25px;">
                        <div class="widget">
                            <span class="label">Total doctors</span>
                            <div id="total-doctors-count" class="kpi-value">0</div>
                        </div>
                        <div class="widget">
                            <span class="label">New This Month</span>
                            <div id="new-doctors-count" class="kpi-value" style="color: #00FF7F;">0</div>
                        </div>
                    </div>

                    <div class="search-bar widget" style="margin-bottom: 20px;">
                        <input type="text" id="doctors-search" placeholder="Search doctor by name or email..." class="search-box input" style="width: 100%;">
                    </div>

                    <div class="table-responsive widget">
                        <table id="doctors-table">
                            <thead>
                                <tr>
                                    <th>First Name</th>
                                    <th>Last Name</th>
                                    <th>✉️ Email</th>
                                    <th>Specialty</th>
                                    <th>📞 Phone</th>
                                    <th>Address</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="doctors-body"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <footer class="main-footer">
                <p>&copy; 2026 Dashboard Pharma</p>
            </footer>
        </main>
    </div>

    <!-- Modal pour ajout/édition de doctor -->
   <div id="doctor-modal" class="modal">
    <div class="modal-content">
        <header class="widget-header">
            <h3>Add New doctor</h3>
        </header>
        <form id="doctor-form" style="display: flex; flex-direction: column; gap: 10px; padding-top: 15px;">
            <input type="text" name="first_name" placeholder="First Name *" required>
            <input type="text" name="last_name" placeholder="Last Name *" required>
            <input type="text" name="specialty" placeholder="Specialty">
            <input type="email" name="email" placeholder="Email *" required>
            <input type="text" name="phone" placeholder="Phone Number">
            <input type="text" name="address" placeholder="Address">

            <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button type="button" id="close-modal" class="btn-secondary" style="padding: 10px 20px; border-radius: 8px; cursor: pointer;">Cancel</button>
                <button type="submit" class="btn-logout-top">Save doctor</button>
            </div>
        </form>
    </div>
</div>

    <script src="javascript/doctors.js"></script>
</body>
</html>
